services:
  - type: web
    name: quizloop-web
    runtime: docker
    plan: free
    rootDir: web
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
      - key: QUIZLOOP_DB_PATH
        value: /data/quizloop.sqlite
      - key: GEMMA_MODEL
        value: gemma4:e2b
      - key: GEMMA_BASE_URL
        sync: false
